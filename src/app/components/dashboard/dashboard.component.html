<div class="dashboard-container" style="background: #f8fafc; min-height: 100vh; padding: 1.5rem;">

  <!-- ===== EN-TÊTE DE BIENVENUE – avec dégradé bleu ===== -->
  <div class="welcome-card p-5 mb-5 shadow-4 border-round-3xl relative overflow-hidden"
       style="background: linear-gradient(to bottom, 
                #60a5fa 0%, 
                #60a5fa 40%, 
                #60a5fa 70%, 
                #2483f7 100%);
              color: #1e293b;">

    <!-- Overlay léger pour lisibilité -->
    <div class="absolute inset-0 bg-white bg-opacity-15 backdrop-blur-sm"></div>

    <div class="relative z-10 flex flex-column md:flex-row align-items-center justify-content-between gap-4">
      <div class="flex align-items-center">
        <div class="avatar-large mr-4">
          <div class="bg-gradient-to-br from-blue-500 to-indigo-600 border-circle p-4 shadow-2">
            <i class="pi pi-user text-4xl text-white"></i>
          </div>
        </div>
        <div>
          <h1 class="text-4xl font-bold m-0" style="color: #1e293b;">
            {{ getGreeting() }}, {{ userName }}
          </h1>
          <p class="text-lg mt-2 opacity-90">
            <i class="pi pi-briefcase mr-2"></i> {{ userRole }} •
            <i class="pi pi-calendar ml-3 mr-2"></i> {{ currentDate | date:'EEEE dd MMMM yyyy' }}
          </p>
        </div>
      </div>

      <div class="flex gap-3">
        <button pButton pRipple icon="pi pi-refresh" 
                class="p-button-rounded p-button-text text-white hover:bg-white hover:bg-opacity-20"
                (click)="refreshData()" 
                pTooltip="Rafraîchir"></button>
        <button pButton pRipple icon="pi pi-calendar" 
                class="p-button-rounded p-button-text text-white hover:bg-white hover:bg-opacity-20"
                pTooltip="Calendrier"></button>
        <button pButton pRipple icon="pi pi-bell" 
                class="p-button-rounded p-button-text text-white hover:bg-white hover:bg-opacity-20"
                pTooltip="Notifications">
          <span class="p-badge p-badge-danger">3</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== INDICATEURS DE PERFORMANCE ===== -->
  <div class="grid mb-5">
    <div class="col-12 md:col-6 lg:col-3" *ngFor="let stat of statsData">
      <div class="stat-card p-4 border-round-xl shadow-2 hover:shadow-4 transition-all duration-300"
           style="background: white; border: 1px solid #e5e7eb;">
        <div class="flex align-items-center justify-content-between">
          <div>
            <span class="text-sm text-gray-600 block mb-1">{{ stat.label }}</span>
            <div class="flex align-items-center gap-3">
              <p class="text-3xl font-extrabold m-0" [style.color]="stat.color">
                {{ stat.value }}
              </p>
              <span class="text-xs px-3 py-1 border-round-xl font-medium"
                    [style.backgroundColor]="stat.bgColor + '30'"
                    [style.color]="stat.color">
                {{ stat.change }}
              </span>
            </div>
          </div>
          <div class="p-3 border-circle shadow-1" [style.backgroundColor]="stat.bgColor + '20'">
            <i [class]="stat.icon" [style.color]="stat.color" class="text-2xl"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== ANALYSE ET ACTIVITÉS ===== -->
  <div class="grid mb-5">
    <div class="col-12 lg:col-8">
      <div class="card p-5 border-round-xl shadow-2" style="background: white; border: 1px solid #e5e7eb;">
        <div class="flex align-items-center justify-content-between mb-4">
          <div class="flex align-items-center gap-3">
            <i class="pi pi-chart-bar text-3xl" style="color: #2563eb;"></i>
            <h3 class="text-xl font-bold text-gray-800 m-0">Activité hebdomadaire</h3>
          </div>
          <div class="flex gap-2">
            <button pButton pRipple label="Semaine" class="p-button-sm p-button-outlined border-blue-500 text-blue-600"></button>
            <button pButton pRipple label="Mois" class="p-button-sm"></button>
          </div>
        </div>

        <!-- Graphique -->
        <div class="chart-container" style="height: 280px;">
          <div class="flex align-items-end justify-content-around h-full gap-3">
            <div *ngFor="let value of chartData.values; let i = index" 
                 class="flex flex-column align-items-center flex-1">
              <div class="text-sm font-medium text-gray-600 mb-2">{{ value }}</div>
              <div class="w-full border-round-lg transition-all duration-300 hover:shadow-lg"
                   [style.height.px]="value * 2.5"
                   [style.background]="'linear-gradient(180deg, #60a5fa, #2563eb)'">
              </div>
              <div class="text-sm text-gray-500 mt-3">{{ chartData.labels[i] }}</div>
            </div>
          </div>
        </div>

        <div class="flex justify-content-center gap-5 mt-5 pt-3 border-top-1 surface-border">
          <div class="flex align-items-center gap-2">
            <div class="w-3 h-3 border-round" style="background: #2563eb;"></div>
            <span class="text-sm text-gray-600">Documents traités</span>
          </div>
          <div class="flex align-items-center gap-2">
            <div class="w-3 h-3 border-round" style="background: #60a5fa;"></div>
            <span class="text-sm text-gray-600">Objectif</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Activités récentes -->
    <div class="col-12 lg:col-4">
      <div class="card p-5 border-round-xl shadow-2 h-full" style="background: white; border: 1px solid #e5e7eb;">
        <!-- ... contenu activités récentes inchangé ... -->
      </div>
    </div>
  </div>

  <!-- ===== ÉPIS VIRTUELS ===== -->
  <!-- ... reste du code des épis (inchangé ou à ajuster si besoin) ... -->

  <!-- ===== NOTIFICATIONS ===== -->
  <!-- ... reste du code notifications (inchangé) ... -->

</div>
